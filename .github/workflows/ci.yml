name: ci

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true

    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Run lint
        run: bun run biome:check

      - name: Run test
        run: bun test

      - name: Run build
        run: bun run build
